<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__body">
    <tndm-input-component
      label="Email"
      name="email"
      [formControl]="emailControl"
      [id]="'email'"
      [placeholder]="'Enter email'"
      [type]="'email'" />
    <tndm-input-component
      label="Password"
      name="password"
      [formControl]="passwordControl"
      [id]="'password'"
      [placeholder]="'Enter password'"
      [type]="'password'" />
  </div>

  <div class="form__footer">
    <tndm-button [btnConfig]="signInBtnConfig()" />
    <tndm-button [btnConfig]="signWithGoogleBtnConfig()" (click)="signWithOAuth('google')" />
    <tndm-button [btnConfig]="signWithGithubBtnConfig()" (click)="signWithOAuth('github')" />
    <h5 class="form__subtitle">You have an account?</h5>
    <tndm-button [btnConfig]="toRegisterBtnConfig()" (click)="navigateToRegister()" />
    <a class="form__link" [routerLink]="toForgotPasswordPath">Forgot Password?</a>
  </div>
</form>
