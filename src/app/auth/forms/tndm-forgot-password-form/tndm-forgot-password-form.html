<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">FORGOT PASSWORD</div>
    <div class="form__sub-title">
      <h5 class="title">remembered password?</h5>
      <a class="form__link" [routerLink]="toLoginPath">sign in</a>
    </div>
    <div class="form__sub-title">
      <h5 class="title">want to create new account?</h5>
      <a class="form__link" [routerLink]="toRegisterPath">sign up</a>
    </div>
  </div>
  <div class="form__body">
    <div class="form__description">Enter your email address to get recover email</div>
    <tndm-input
      label="Email"
      name="email"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="emailControl"
      [id]="'email'"
      [placeholder]="'Enter email'"
      [type]="'email'" />
  </div>
  <div class="form__footer">
    <tndm-button [btnConfig]="resetPasswordBtnConfig()" />
  </div>
</form>
