<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">{{ 'auth.forgotPassword' | transloco }}</div>
    <div class="form__sub-title">
      <h5 class="title">{{ 'auth.rememberedPassword' | transloco }}</h5>
      <a class="form__link" [routerLink]="toLoginPath">{{ 'auth.signIn' | transloco }}</a>
    </div>
    <div class="form__sub-title">
      <h5 class="title">{{ 'auth.wantCreateNewAccount' | transloco }}</h5>
      <a class="form__link" [routerLink]="toRegisterPath">{{ 'auth.signUp' | transloco }}</a>
    </div>
  </div>
  <div class="form__body">
    <div class="form__description">{{ 'auth.enterEmailAddressGetRecoverEmail' | transloco}}</div>
    <tndm-input
      label="{{'auth.email' | transloco}}"
      name="email"
      placeholder="{{'auth.enterEmail' | transloco }}"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="emailControl"
      [id]="'email'"
      [type]="'email'" />
  </div>
  <div class="form__footer">
    <tndm-button [btnConfig]="resetPasswordBtnConfig()" />
  </div>
</form>
