<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">UPDATE PASSWORD</div>
    <div class="form__sub-title">
      <h5 class="title">continue without changes?</h5>
      <a class="form__link" [routerLink]="toHomePath">home</a>
    </div>
  </div>
  <div class="form__body">
    <div class="form__description">Enter new password to update</div>
    <tndm-input
      label="Password"
      name="password"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="passwordControl"
      [id]="'password'"
      [placeholder]="'Enter password'"
      [type]="'password'" />
  </div>
  <div class="form__footer">
    <tndm-button [btnConfig]="updatePasswordBtnConfig()" />
  </div>
</form>
