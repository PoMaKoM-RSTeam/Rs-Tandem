<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">{{'auth.updatePassword'| transloco}}</div>
    <div class="form__sub-title">
      <h5 class="title">{{'auth.continueWithoutChanges'| transloco}}</h5>
      <a class="form__link" [routerLink]="toHomePath">{{'auth.home'| transloco}}</a>
    </div>
  </div>
  <div class="form__body">
    <div class="form__description">{{'auth.EnterNewPasswordToUpdate'| transloco}}</div>
    <tndm-input
      label="{{'auth.password'| transloco}}"
      name="password"
      placeholder="{{'auth.enterPassword'| transloco}}"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="passwordControl"
      [id]="'password'"
      [type]="'password'" />
  </div>
  <div class="form__footer">
    <tndm-button [btnConfig]="updatePasswordBtnConfig()" />
  </div>
</form>
