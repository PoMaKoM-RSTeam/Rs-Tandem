<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">{{ 'auth.registration' | transloco }}</div>
    <div class="form__sub-title">
      <h5 class="title">{{ 'auth.alreadyHaveAccount' | transloco}}</h5>
      <a class="form__link" [routerLink]="toLoginPath">{{'auth.signIn' | transloco}}</a>
    </div>
  </div>
  <div class="form__body">
    <tndm-input
      label="{{'auth.login' | transloco}}"
      name="login"
      placeholder="{{'auth.enterLogin' | transloco}}"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="loginControl"
      [id]="'login'"
      [type]="'text'" />
    <tndm-input
      label="{{'auth.email' | transloco}}"
      name="email"
      placeholder="{{'auth.enterEmail' | transloco}}"
      [formControl]="emailControl"
      [id]="'email'"
      [type]="'email'" />
    <tndm-input
      label="{{'auth.password' | transloco}}"
      name="password"
      placeholder="{{'auth.enterPassword' | transloco}}"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="passwordControl"
      [id]="'password'"
      [type]="'password'" />
    <tndm-button [btnConfig]="signUpBtnConfig()" />
  </div>
  <div class="form__footer">
    <div class="form__sign-with">
      <div class="custom-divider">{{ 'auth.orSignUpWith' | transloco }}</div>
      <tndm-button [btnConfig]="signWithGoogleBtnConfig()" (click)="signWithOAuth('google')" />
      <tndm-button [btnConfig]="signWithGithubBtnConfig()" (click)="signWithOAuth('github')" />
    </div>
    <a class="form__link" [routerLink]="toForgotPasswordPath">{{ 'auth.forgotPassword' | transloco }}</a>
  </div>
</form>
