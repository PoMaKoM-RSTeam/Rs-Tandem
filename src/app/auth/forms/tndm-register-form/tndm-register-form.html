<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__header">
    <div class="form__title">SIGN UP</div>
    <div class="form__sub-title">
      <h5 class="title">already have an account?</h5>
      <a class="form__link" [routerLink]="toLoginPath">sign in</a>
    </div>
  </div>
  <div class="form__body">
    <tndm-input
      label="Login"
      name="login"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="loginControl"
      [id]="'login'"
      [placeholder]="'Enter your login'"
      [type]="'text'" />
    <tndm-input
      label="Email"
      name="email"
      [formControl]="emailControl"
      [id]="'email'"
      [placeholder]="'Enter email'"
      [type]="'email'" />
    <tndm-input
      label="Password"
      name="password"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="passwordControl"
      [id]="'password'"
      [placeholder]="'Enter password'"
      [type]="'password'" />
    <tndm-button [btnConfig]="signUpBtnConfig()" />
  </div>
  <div class="form__footer">
    <div class="form__sign-with">
      <div class="custom-divider">or sign up with</div>
      <tndm-button [btnConfig]="signWithGoogleBtnConfig()" (click)="signWithOAuth('google')" />
      <tndm-button [btnConfig]="signWithGithubBtnConfig()" (click)="signWithOAuth('github')" />
    </div>
    <a class="form__link" [routerLink]="toForgotPasswordPath">Forgot Password?</a>
  </div>
</form>
