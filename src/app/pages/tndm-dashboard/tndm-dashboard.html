<section class="dashboard">
  <tndm-dashboard-widget
    class="user-stats"
    [current]="userProgress().current"
    [label]="userProgress().max"
    [max]="userProgress().max"
    [stats]="playerStats()" />

  <tndm-streak-calendar [streakData]="streakData()" />

  @for (game of gamesProgress(); track game.title) {
  <tndm-dashboard-widget
    [class.is-expanded]="expandedGame() === game.title"
    [current]="game.current"
    [max]="game.max"
    [stats]="game.stats"
    [title]="game.title"
    (click)="toggleGame(game.title)" />
  }

  <tndm-leaderboard-widget [currentUserId]="user()?.userId" [leaderboard]="leaderboard()" />
  @if(!expandedGame()){
  <div class="logo-wrapper">
    <img alt="logotype" class="logo" [ngSrc]="'svgs/union.svg'" />
  </div>
  }
</section>
