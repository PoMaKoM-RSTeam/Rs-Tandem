<div class="streak-card">
  <div class="streak-card__header">
    <p class="streak-card__current">{{streakData()?.current_streak}}</p>
    <div class="streak-card__info">
      <p class="label">Days Streak</p>
      <p class="status">nice</p>
      <p class="max">max streak: {{streakData()?.max_streak || 0}}</p>
    </div>
  </div>

  <div class="streak-calendar">
    <div class="streak-calendar__days-label">
      @for (label of daysOfWeek; track $index) {
      <span>{{ label }}</span>
      }
    </div>

    <ul class="streak-calendar__days-grid">
      @for (day of calendarDays(); track day.date) {
      <li [attr.data-date]="day.date" [class.active]="day.isActive" [class.today]="day.isToday"></li>
      }
    </ul>
  </div>
</div>
