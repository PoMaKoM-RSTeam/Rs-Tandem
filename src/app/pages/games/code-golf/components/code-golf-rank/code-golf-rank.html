<div class="best-result">
  @if (previousBest(); as best) {
  <div class="record-badge">
    <span class="label">Your best result:</span>
    <span class="value">{{ best }} Bytes</span>
  </div>
  @if (byteDiff(); as diff) {
  <div class="diff-indicator" [class.progress]="diff > 0" [class.regress]="diff < 0">
    {{ diff }} Bytes
    <span class="diff-label"> ({{ diff > 0 ? 'progress' : 'regress' }}) </span>
  </div>
  } }
</div>
<div class="game-info">
  @if (rank(); as rank) {
  <div class="rank-info">
    <span class="icon">{{ rank.icon }}</span>
    <div class="details">
      <div class="rank" [style.color]="rank.color">{{ rank.label }}</div>
      <div class="bytes-amount">{{ byteCount() }} Bytes</div>
    </div>
  </div>
  <div class="rank-progress">
    <div class="progress-fill" [style.background-color]="rank.color" [style.width.%]="rank.width"></div>
  </div>
  }
</div>
