<tndm-code-golf-rank [byteCount]="byteCount()" [rank]="currentRank()" />

@if (currentChallenge(); as challenge) {
<div class="challenge-wrapper">
  <h2 class="challenge-title">{{ challenge.title }}</h2>
  <p class="challenge-description">{{ challenge.description }}</p>
</div>
} @else if (challengeResource.isLoading()) {
<p>Loading Challenge...</p>
}

<tndm-code-golf-editor [(value)]="rawCode" />

<div class="controls">
  <tndm-button [btnConfig]="checkBtnConfig" />
  <tndm-button [btnConfig]="nextBtnConfig" (click)="nextChallenge()" />
</div>
