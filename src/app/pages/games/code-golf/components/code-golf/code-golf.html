<tndm-code-golf-rank
  [byteCount]="service.byteCount()"
  [previousBest]="service.previousBest()"
  [rank]="service.currentRank()" />

@if (service.challengeResource.isLoading()) {
<p class="challenge-info">Loading Challenge...</p>
} @else if (service.currentChallenge(); as challenge) {
<div class="challenge-wrapper">
  <h2 class="challenge-title">{{ challenge.title }}</h2>
  <p class="challenge-description">{{ challenge.description }}</p>
</div>
} @else {
<p class="challenge-info">No challenges available at the moment.</p>
} @if (service.showResults() && service.result(); as result) {
<tndm-code-golf-results [result]="result" (closeModal)="closeModal()" />
}

<tndm-code-golf-editor [(value)]="service.rawCode" />

<div class="controls">
  <tndm-button [btnConfig]="checkBtnConfig()" (click)="service.checkSolution()" />
  <tndm-button [btnConfig]="{ label: ('golf.next' | transloco) }" (click)="service.nextChallenge()" />
</div>
