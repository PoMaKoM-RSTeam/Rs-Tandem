<div class="page">
  <div class="page_layout">
    <tndm-case-sidebar
      [activeCaseId]="activeCase()?.id ?? null"
      [cases]="allCases()"
      [completedIds]="completedIds()"
      (caseSelected)="onCaseSelected($event)" />

    <main class="page_main">
      @if (activeCase(); as selectedCase) {
      <tndm-code-viewer [reviewCase]="selectedCase" (solved)="onCaseSolved($event)" />
      } @else {
      <div class="page_placeholder">
        <p>{{ 'reverseCodeReview.selectCase' | transloco }}</p>
      </div>
      }
    </main>
  </div>
</div>

@if (showModal()) {
<tndm-completion-modal [maxScore]="maxScore()" [score]="lastScore()" (closed)="closeModal()" (nextCase)="nextCase()" />
}
