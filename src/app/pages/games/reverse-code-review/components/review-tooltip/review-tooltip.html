<div class="review-tooltip" [style.top.px]="topPx()">
  <div class="review-tooltip_header">
    <span class="review-tooltip_label">{{ 'reverseCodeReview.selectErrorType' | transloco }}</span>
    <button class="review-tooltip_close" type="button" (click)="closed.emit()">&times;</button>
  </div>

  @if (wrongType()) {
  <p class="review-tooltip_error">{{ 'reverseCodeReview.wrongCategory' | transloco }}</p>
  }

  <div class="review-tooltip_options">
    @for (errorType of errorTypes; track errorType) {
    <button class="review-tooltip_option" type="button" (click)="typeSelected.emit(errorType)">{{ errorType }}</button>
    }
  </div>
</div>
