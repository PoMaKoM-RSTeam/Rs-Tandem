<aside class="sidebar">
  <h2 class="sidebar_title">{{ 'reverseCodeReview.cases' | transloco }}</h2>
  <ul class="sidebar_list">
    @for (reviewCase of cases(); track reviewCase.id; let idx = $index) {
    <li>
      <button
        class="sidebar_item"
        type="button"
        [class.sidebar_item--active]="reviewCase.id === activeCaseId()"
        [class.sidebar_item--done]="completedIds().has(reviewCase.id)"
        (click)="caseSelected.emit(reviewCase)">
        <span class="sidebar_status">
          @if (completedIds().has(reviewCase.id)) {
          <span class="sidebar_check">✓</span>
          } @else {
          <span class="sidebar_index">{{ idx + INDEX_SHIFT }}</span>
          }
        </span>
        <span class="sidebar_name">{{ reviewCase.title | transloco}}</span>
        <span class="sidebar_difficulty" [attr.data-diff]="reviewCase.difficulty"> {{ reviewCase.difficulty }} </span>
      </button>
    </li>
    }
  </ul>
</aside>
