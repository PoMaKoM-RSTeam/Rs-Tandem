<aside aria-label="Review cases" class="sidebar">
  <h2 class="sidebar_title">Cases</h2>
  <nav class="sidebar_list" role="list">
    @for (reviewCase of cases(); track reviewCase.id; let idx = $index) {
    <button
      class="sidebar_item"
      role="listitem"
      type="button"
      [class.sidebar_item--active]="reviewCase.id === activeCaseId()"
      (click)="caseSelected.emit(reviewCase)">
      <span class="sidebar_index">{{ idx + 1 }}</span>
      <span class="sidebar_name">{{ reviewCase.title }}</span>
      <span class="sidebar_difficulty" [attr.data-diff]="reviewCase.difficulty"> {{ reviewCase.difficulty }} </span>
    </button>
    }
  </nav>
</aside>
