<div #chatContainer class="chat-container">
  <div class="chat-content">
    @for (message of allMessages(); track $index;) {
    <div
      class="message-wrapper"
      [class.chat-message-user]="message.role === 'user'"
      [class.row-with-spinner]="$last && isLoading()">
      @if (message.role === ROLES.assistant) {
      <markdown class="ai-question" [data]="message.content" />
      } @else if (message.role === ROLES.user){ @if ($last && isLoading()) {
      <div class="spinner"></div>
      }
      <div class="user-message-bubble">{{ message.content }}</div>
      }
    </div>
    }
  </div>
</div>
