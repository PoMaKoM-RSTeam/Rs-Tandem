<tndm-toaster />
<p class="description">
  {{ 'aiExam.description' | transloco }}<br />
  {{ 'aiExam.descriptionLine2' | transloco: { maxAllowedAttempts: MAX_ALLOWED_ATTEMPTS, oneMoreThanMax:
  MAX_ALLOWED_ATTEMPTS + 1 } }}
</p>

<div class="button-wrapper">
  <tndm-button
    [btnConfig]="{
      label: ('aiExam.generateQuestion' | transloco),
      isDisabled: isGenerateQuestionDisabled()
    }"
    [class.await-loading]="isLoading()"
    (clicked)="generateQuestion()" />
  <tndm-button
    [btnConfig]="{
      label: ('aiExam.skipQuestion' | transloco: { seconds: skipQuestionSeconds()}),
      isDisabled: isSkipQuestionDisabled() }"
    [class.await-loading]="isLoading()"
    (clicked)="skipQuestion()" />
</div>

<tndm-chat [isLoading]="isLoading()" />

<form #answerForm (submit)="answerQuestion($event)">
  <label class="text-input-instruction" for="user-answer">{{ 'aiExam.answerLabel' | transloco }}</label>
  <textarea
    #textInput
    class="text-input"
    cols="10"
    id="user-answer"
    name="user-answer"
    placeholder="{{ 'aiExam.answerPlaceholder' | transloco }}"
    rows="4"
    [class.await-loading]="isLoading()"
    [disabled]="isAnswerQuestionDisabled() || isLoading()"
    (keydown)="onTextInputKeydown($event, answerForm)"></textarea>
  <tndm-button
    [btnConfig]="{
      label: ('aiExam.answerButton' | transloco),
      type: 'submit',
      isDisabled: isAnswerQuestionDisabled()
    }"
    [class.await-loading]="isLoading()" />
</form>
