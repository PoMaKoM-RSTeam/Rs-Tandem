<tndm-toaster />
<p>
  Generate a random question and answer it.<br />
  You have roughly {{MAX_ALLOWED_ATTEMPTS}}-{{MAX_ALLOWED_ATTEMPTS + 1}} attempts to give the right answer. Don't waste
  them. Every message counts.
</p>

<div class="button-wrapper">
  <tndm-button
    [btnConfig]="{ label: 'New question', isDisabled: isGenerateQuestionDisabled()}"
    [class.await-loading]="isLoading()"
    (clicked)="generateQuestion({language: 'english'})" />
  <tndm-button
    [btnConfig]="{ label: 'Новый вопрос', isDisabled: isGenerateQuestionDisabled()}"
    [class.await-loading]="isLoading()"
    (clicked)="generateQuestion({language: 'russian'})" />
  <tndm-button
    [btnConfig]="{ label: `Skip question (${skipQuestionSeconds()} sec)`, isDisabled: isSkipQuestionDisabled() }"
    [class.await-loading]="isLoading()"
    (clicked)="skipQuestion()" />
</div>

<tndm-chat [isLoading]="isLoading()" />

<form #answerForm (submit)="answerQuestion($event)">
  <label for="user-answer">Write your answer to the question:</label>
  <textarea
    #textInput
    cols="10"
    id="user-answer"
    name="user-answer"
    placeholder="Your answer"
    rows="4"
    [class.await-loading]="isLoading()"
    [disabled]="isAnswerQuestionDisabled() || isLoading()"
    (keydown)="onTextInputKeydown($event, answerForm)"></textarea>
  <tndm-button
    [btnConfig]="{label: 'Answer the question', type: 'submit', isDisabled: isAnswerQuestionDisabled()}"
    [class.await-loading]="isLoading()" />
</form>
