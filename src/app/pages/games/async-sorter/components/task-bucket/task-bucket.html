<h4 class="bucket-heading">{{ heading() }}</h4>
<ul cdkDropList class="bucket-content" [cdkDropListData]="codeBlocks()" (cdkDropListDropped)="drop($event)">
  @for (item of codeBlocks(); track item) {
  <li
    class="list-item"
    tndm-code-block
    [cdkDragData]="item"
    [executionOrder]="item.executionOrder"
    [inWrongBucket]="item.taskType !== taskType()"
    [isPlacedCorrectly]="item.taskType === taskType()">
    <pre>{{ item.code }}</pre>
  </li>
  }
</ul>
