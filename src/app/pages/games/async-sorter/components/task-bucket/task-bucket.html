<h4 class="bucket-heading">{{ heading() }}</h4>
<ul
  cdkDropList
  class="bucket-content"
  [cdkDropListData]="bucketItems"
  [cdkDropListEnterPredicate]="taskTypePredicate"
  (cdkDropListDropped)="drop($event)">
  @for (item of bucketItems; track item) {
  <li class="list-item" tndm-code-block [cdkDragData]="item">
    <pre>{{ item.code }}</pre>
  </li>
  }
</ul>
