<div class="not-found__wrapper">
  <div class="not-found__logo-cnt">
    <div class="not-found__logo-wrapper">
      <tndm-dot-grid />
    </div>
  </div>
  <div class="not-found__content-cnt">
    <div class="not-found__content-wrapper">
      <div class="not-found__header">
        <div class="not-found__title">{{ 'nfound.title' | transloco }}</div>
        <div class="not-found__subtitle">{{ 'nfound.subtitle' | transloco }}</div>
      </div>
      <div class="not-found__body">
        <div class="not-found__content">{{ 'nfound.body' | transloco }}</div>
      </div>
      <div class="not-found__footer">
        <tndm-button [btnConfig]="toMainBtnConfig()" (click)="toMainPage()" />
      </div>
    </div>
  </div>
</div>
