<mat-grid-list cols="2" rowHeight="500px" gutterSize="16px">
  <mat-grid-tile>
    <mat-tab-group [selectedIndex]="selectedTab()" (selectedIndexChange)="selectedTab.set($event)">
      @for (tab of tabs; let i = $index; track tab) {
      <mat-tab [label]="tab">
        <ngx-monaco-editor [options]="{...editorOptions, language: getLanguage(tab)}" [ngModel]="getCode(tab)"
          (ngModelChange)="setCode(tab, $event)" style="height:400px;">
        </ngx-monaco-editor>
      </mat-tab>
      }
    </mat-tab-group>
  </mat-grid-tile>
  <mat-grid-tile>
    <div style="height:100%; border:1px solid #ccc; border-radius:4px; overflow:hidden;">
      <iframe [srcdoc]="previewContent()" width="100%" height="100%" frameborder="0"></iframe>
    </div>
  </mat-grid-tile>
</mat-grid-list>
