<div class="sandbox-wrapper">
  <div class="editor-section">
    <mat-tab-group dynamicHeight [selectedIndex]="selectedTab()" (selectedIndexChange)="selectedTab.set($event)">
      @for (tab of tabs; track tab) {
      <mat-tab [label]="tab">
        <div class="editor-container">
          <ngx-monaco-editor
            [ngModel]="getCode(tab)"
            [options]="editorConfigs()[tab]"
            (ngModelChange)="onCodeChange(tab, $event)" />
        </div>
      </mat-tab>
      }
    </mat-tab-group>
  </div>

  <div class="preview-section">
    <div class="preview-header">Live Preview</div>

    <iframe frameborder="0" [srcdoc]="previewContent()"> </iframe>
  </div>
</div>
