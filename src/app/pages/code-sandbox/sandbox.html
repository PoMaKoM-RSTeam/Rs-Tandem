<h2 class="page-header">Sandbox</h2>

<div class="sandbox-wrapper" [class.is-fullscreen]="isFullscreen()">
  <div class="editor-section">
    <div class="tabs-header-area">
      <mat-tab-group
        class="flex-tabs"
        dynamicHeight
        [selectedIndex]="selectedTab()"
        (selectedIndexChange)="selectedTab.set($event)">
        @for (tab of tabs; track tab) {
        <mat-tab [label]="tab" />
        }
      </mat-tab-group>

      <div class="editor-controls">
        <tndm-button [btnConfig]="downloadBtnConfig" (clicked)="download()" />
        <tndm-button [btnConfig]="uploadBtnConfig" (clicked)="save()" />
        <tndm-button [btnConfig]="fullscreenBtnConfig()" (clicked)="toggleFullscreen()" />
      </div>
    </div>

    <div class="editor-container">
      <ngx-monaco-editor
        [ngModel]="tabConfig[tabs[selectedTab()]].code()"
        [options]="editorConfigs()[tabs[selectedTab()]]"
        (ngModelChange)="tabConfig[tabs[selectedTab()]].code.set($event)" />
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-header">{{ 'sandbox.livePreview' | transloco }}</div>
    <iframe frameborder="0" [srcdoc]="previewContent()"></iframe>
  </div>
</div>
