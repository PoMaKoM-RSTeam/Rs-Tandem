<h2 class="page-header">Sandbox</h2>

<div class="sandbox-wrapper" [class.is-fullscreen]="service.isFullscreen()">
  <div class="editor-section">
    <div class="tabs-header-area">
      <mat-tab-group class="flex-tabs" dynamicHeight [selectedIndex]="service.selectedTab()"
        (selectedIndexChange)="service.selectedTab.set($event)">
        @for (tab of service.tabs; track tab) {
        <mat-tab [label]="tab" />
        }
      </mat-tab-group>

      <div class="editor-controls">
        <tndm-button [btnConfig]="downloadBtnConfig" (clicked)="download()" />
        <tndm-button [btnConfig]="uploadBtnConfig" (clicked)="save()" />
        <tndm-button [btnConfig]="fullscreenBtnConfig()" (clicked)="toggleFullscreen()" />
      </div>
    </div>

    <div class="editor-container">
      <ngx-monaco-editor [ngModel]="service.activeCode()" [options]="service.activeEditorOptions()"
        (ngModelChange)="service.updateActiveCode($event)" />
    </div>
  </div>
